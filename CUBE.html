<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Rotating Skill Cube</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      margin: 0;
    }

    .scene {
      width: 200px;
      height: 200px;
      perspective: 600px;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateCube 8s infinite linear;
    }

    .cube:hover {
      animation-play-state: paused;
    }

    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: #3498db;
      border: 2px solid #fff;
      opacity: 0.9;
    }

    .front  { transform: rotateY(0deg) translateZ(100px); }
    .back   { transform: rotateY(180deg) translateZ(100px); background: #e74c3c; }
    .right  { transform: rotateY(90deg) translateZ(100px); background: #2ecc71; }
    .left   { transform: rotateY(-90deg) translateZ(100px); background: #f1c40f; }
    .top    { transform: rotateX(90deg) translateZ(100px); background: #9b59b6; }
    .bottom { transform: rotateX(-90deg) translateZ(100px); background: #1abc9c; }

    @keyframes rotateCube {
      from { transform: rotateX(0deg) rotateY(0deg); }
      to   { transform: rotateX(360deg) rotateY(360deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cube">
      <div class="face front">HTML</div>
      <div class="face back">CSS</div>
      <div class="face right">JS</div>
      <div class="face left">React</div>
      <div class="face top">Node</div>
      <div class="face bottom">SQL</div>
    </div>
  </div>
</body>
</html>
